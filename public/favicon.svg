<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1C6EF2" stroke="#93C5FD" stroke-width="2"/>

  <!-- Soccer ball white base -->
  <circle cx="50" cy="50" r="30" fill="white"/>

  <!-- Pentagon patches (classic soccer ball pattern) -->
  <!-- Center top pentagon -->
  <polygon points="50,22 61,30 57,43 43,43 39,30" fill="#0B1120"/>
  <!-- Bottom left -->
  <polygon points="26,44 39,43 43,56 33,64 22,57" fill="#0B1120"/>
  <!-- Bottom right -->
  <polygon points="74,44 78,57 67,64 57,56 61,43" fill="#0B1120"/>
  <!-- Bottom center -->
  <polygon points="43,56 57,56 61,68 50,75 39,68" fill="#0B1120"/>
  <!-- Top left -->
  <polygon points="28,33 39,30 43,43 33,50 24,43" fill="#0B1120"/>
  <!-- Top right -->
  <polygon points="72,33 76,43 67,50 57,43 61,30" fill="#0B1120"/>
</svg>
